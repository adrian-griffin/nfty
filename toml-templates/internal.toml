# nfty template — internal, for hosts on your private, home network
# example is for pihole DNS + SNMP monitoring
# -------------------------------------------------------------------

[core]
  name          = "my-host-firewall"
  description   = "Internal node — pihole DNS & web UI + SNMP monitoring"
  table         = "nfty-default"
  docker_compat = true
  persist       = true

# ---------------------------------------------------------------------------
# Chain Policies — default action when no rule matches
# ---------------------------------------------------------------------------

# if you are unsure about these options, keep them default

[chains.policy]
  input       = "drop"     # drop is the sane default for input
  forward     = "drop"     # drop unless you need routing/NAT
  output      = "accept"   # accept is typical for output
  postrouting = "accept"   # accept is typical for postrouting

# ---------------------------------------------------------------------------
# IP Lists
# ---------------------------------------------------------------------------

# adjust the IPs and subnets in these lists for services you host, as needed

[sets.ipv4.dns]
  comment = "IPv4 DNS Allowlist - keep restricted"
  entries = [
    "10.100.1.0/24", # home subnet
    "172.16.1.0/24", # vpn subnet
  ]

[sets.ipv4.webui]
  comment = "IPv4 Web/HTTP Server Allowlist"
  entries = [
    "10.100.1.5/32", # desktop pc
    "172.16.1.0/24", # vpn subnet
  ]

[sets.ipv4.ssh]
  comment = "SSH Allowlist"
  entries = [
    "10.100.1.5/32", # desktop pc
  ]

[sets.ipv6.dns]
  comment = "IPv6 DNS Allowlist"
  entries = [
    "2001:db8::/64",    # your home IPv6 prefix
    "2001:db8::2/128",  # desktop pc
  ]

# ---------------------------------------------------------------------------
# INPUT — IPv4
# ---------------------------------------------------------------------------

[[chains.ipv4.input]]
  comment = "Allow loopback"
  iif     = "lo"
  action  = "accept"

[[chains.ipv4.input]]
  comment    = "ICMP/Ping rate limit"
  protocol   = "icmp"
  rate_limit = { rate = "10/second", action = "accept" }
  over_limit = "drop"

[[chains.ipv4.input]]
  ct_state = ["established", "related"]
  action   = "accept"

[[chains.ipv4.input]]
  ct_state = ["invalid"]
  action   = "drop"

[[chains.ipv4.input]]
  comment  = "Allowed SSH hosts"
  protocol = "tcp"
  dport    = [22]
  src_set  = "ssh"
  action   = "accept"

[[chains.ipv4.input]]
  comment  = "SSH — log unauthorized attempts"
  protocol = "tcp"
  dport    = [22]
  log      = { prefix = "NFTY DROP 22/TCP: ", level = "warn" }
  action   = "drop"

[[chains.ipv4.input]]
  comment  = "Web HTTP/HTTPS"
  protocol = "tcp"
  dport    = [80, 443]
  src_set  = "webui"
  action   = "accept"

[[chains.ipv4.input]]
  comment  = "DNS - TCP"
  protocol = "tcp"
  dport    = [53]
  src_set  = "dns"
  action   = "accept"

[[chains.ipv4.input]]
  comment  = "DNS - UDP"
  protocol = "udp"
  dport    = [53]
  src_set  = "dns"
  action   = "accept"

# ---------------------------------------------------------------------------
# INPUT — IPv6
# ---------------------------------------------------------------------------

[[chains.ipv6.input]]
  comment = "Allow loopback"
  iif     = "lo"
  action  = "accept"

[[chains.ipv6.input]]
  comment    = "ICMPv6 rate limit - required for IPv6 to function"
  protocol   = "icmpv6"
  rate_limit = { rate = "20/second", action = "accept" }
  over_limit = "drop"

[[chains.ipv6.input]]
  ct_state = ["established", "related"]
  action   = "accept"

[[chains.ipv6.input]]
  ct_state = ["invalid"]
  action   = "drop"

[[chains.ipv6.input]]
  comment  = "DNS IPv6 53/tcp - Please use caution if hosting a DNS server on IPv6"
  protocol = "tcp"
  dport    = [53]
  src_set  = "dns"
  action   = "accept"

[[chains.ipv6.input]]
  comment  = "DNS IPv6 53/udp - Please use caution if hosting a DNS server on IPv6"
  protocol = "udp"
  dport    = [53]
  src_set  = "dns"
  action   = "accept"