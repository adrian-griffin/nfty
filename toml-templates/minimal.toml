# nfty template - minimal, with sane defaults
# good starting point for new nodes or if youre uncertain
# -------------------------------------------------------------------

[core]
  name          = "my-host-firewall"
  description   = "Minimal, sane defaults"
  table         = "nfty-minimal"
  docker_compat = false
  persist       = true
  default_rules = true

  icmpv4_limit  = "10/second"
  icmpv6_limit  = "20/second"
  log_ssh_fails = true

# ---------------------------------------------------------------------------
# IP Lists - Lists to group allowed IPs
# ---------------------------------------------------------------------------

# adjust the IPs and subnets in these lists for services you host, as needed

[lists.ipv4.customlist]
  comment = "Hosts allowed access to services"
  entries = [
    "10.100.1.0/24", # home subnet
    "172.16.1.0/24", # vpn subnet
  ]

# ---------------------------------------------------------------------------
# INPUT - Traffic destined for this device
# ---------------------------------------------------------------------------

[[chains.ipv4.input]]
  comment  = "Allowed SSH hosts"
  protocol = "tcp"
  dport    = [22]
  src_ips = [
    "10.100.1.5/32",  # desktop pc
    "10.100.1.10/32", # laptop
  ]
  action   = "accept"

[[chains.ipv4.input]]
  comment  = "Web HTTP/HTTPS"
  protocol = "tcp"
  dport    = [80, 443]
  src_set  = "customlist"
  action   = "accept"