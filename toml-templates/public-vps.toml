# nfty template — public VPS, for internet-facing servers hosting web services
# example includes caddy reverse proxy & web, wireguard headend, and SNMP monitoring
#
# of course, please excercise caution when dealing with public-facing servers
# when in doubt, lock things down, and use the `minimal.toml` file
# -------------------------------------------------------------------

[core]
  name          = "my-public-host-firewall"
  description   = "Public VPS — caddy reverse proxy + wireguard headend"
  table         = "nfty-default"
  docker_compat = true
  persist       = true

# ---------------------------------------------------------------------------
# IP Lists
# ---------------------------------------------------------------------------

[sets.ipv4.ssh]
  comment = "SSH Allowlist - keep this as tight as possible on a public VPS"
  entries = [
    "172.16.1.0/24", # vpn subnet
    "100.10.1.1/32", # home ISP public IP
  ]

[sets.ipv4.wg_peers]
  comment = "WireGuard public IP allowlist"
  entries = [
    "100.10.1.1/32", # home ISP public IP
  ]

[sets.ipv4.snmp]
  comment = "SNMP monitoring allowlist"
  entries = [
    "172.16.1.5/32", # NMS server VPN address
  ]

[sets.ipv6.ssh]
  comment = "IPv6 SSH allowlist"
  entries = [
    "2001:db8::/64", # home ISP IPv6 prefix
  ]

[sets.ipv6.wg_peers]
  comment = "IPv6 WireGuard peers"
  entries = [
    "2001:db8::2/128", # home router ipv6
  ]

# ---------------------------------------------------------------------------
# INPUT — IPv4
# ---------------------------------------------------------------------------

[[chains.ipv4.input]]
  comment = "Allow loopback"
  iif     = "lo"
  action  = "accept"

[[chains.ipv4.input]]
  comment    = "ICMP rate limit"
  protocol   = "icmp"
  rate_limit = { rate = "50/second", action = "accept" }
  over_limit = "drop"

[[chains.ipv4.input]]
  ct_state = ["established", "related"]
  action   = "accept"

[[chains.ipv4.input]]
  ct_state = ["invalid"]
  action   = "drop"

[[chains.ipv4.input]]
  comment  = "SSH — allowlist only"
  protocol = "tcp"
  dport    = [22]
  src_set  = "ssh"
  action   = "accept"

[[chains.ipv4.input]]
  comment  = "SSH — log and drop everything else"
  protocol = "tcp"
  dport    = [22]
  log      = { prefix = "NFTY DROP 22/TCP: ", level = "warn" }
  action   = "drop"

[[chains.ipv4.input]]
  comment  = "SNMP — monitoring host only"
  protocol = "udp"
  dport    = [161]
  src_set  = "snmp"
  action   = "accept"

[[chains.ipv4.input]]
  comment    = "HTTP/HTTPS new connections — rate limited"
  iifname    = "eth0"
  protocol   = "tcp"
  dport      = [80, 443]
  ct_state   = ["new"]
  rate_limit = { rate = "20/second", burst = "50 packets", action = "accept" }
  over_limit = "drop"

[[chains.ipv4.input]]
  comment    = "HTTP/HTTPS established — rate limited"
  iifname    = "eth0"
  protocol   = "tcp"
  dport      = [80, 443]
  rate_limit = { rate = "100/second", burst = "200 packets", action = "accept" }
  over_limit = "drop"

[[chains.ipv4.input]]
  comment  = "WireGuard tunnel socket"
  protocol = "udp"
  dport    = [51820]
  src_set  = "wg_peers"
  action   = "accept"

# ---------------------------------------------------------------------------
# INPUT — IPv6
# ---------------------------------------------------------------------------

[[chains.ipv6.input]]
  comment = "Allow loopback"
  iif     = "lo"
  action  = "accept"

[[chains.ipv6.input]]
  comment    = "ICMPv6 rate limit — required for IPv6 to function"
  protocol   = "icmpv6"
  rate_limit = { rate = "100/second", action = "accept" }
  over_limit = "drop"

[[chains.ipv6.input]]
  ct_state = ["established", "related"]
  action   = "accept"

[[chains.ipv6.input]]
  ct_state = ["invalid"]
  action   = "drop"

[[chains.ipv6.input]]
  comment  = "SSH IPv6 — allowlist only"
  protocol = "tcp"
  dport    = [22]
  src_set  = "ssh"
  action   = "accept"

[[chains.ipv6.input]]
  comment  = "SSH IPv6 — log and drop everything else"
  protocol = "tcp"
  dport    = [22]
  log      = { prefix = "NFTY DROP 22/TCP: ", level = "warn" }
  action   = "drop"

[[chains.ipv6.input]]
  comment  = "WireGuard IPv6"
  protocol = "udp"
  dport    = [51820]
  src_set  = "wg_peers"
  action   = "accept"

