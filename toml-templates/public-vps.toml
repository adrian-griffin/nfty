# nfty - public VPS
# basics for hosting a VPS or public server securely
# example: reverse proxy + wireguard headend + SNMP over VPN
## public hosts ALWAYS deserve extra caution, when in doubt, fall back to minimal.toml!
# -------------------------------------------------------------------

[core]
  name          = "my-public-host-firewall"
  description   = "Public VPS - caddy + wireguard + SNMP"
  table         = "nfty-public"
  docker_compat = false
  default_rules = true
  icmp_limit    = "20/s"

  # if you DONT block ssh at the VPS firewall/portal level, this might get a lot of hits
  log_ssh_fails = true

[chains.policy]
  input       = "drop"   # if this is a public host, do NOT change this
  forward     = "drop"   # keep disabled & manually whitelist below, unless you have good reason
  output      = "accept"
  postrouting = "accept"

# ---------------------------------------------------------------------------
# IP Lists - keep these limited on a public IP host
# ---------------------------------------------------------------------------

[lists.ipv4.ssh]
  comment = "SSH - on a public node, keep this very tight"
  entries = [
    "172.16.1.0/24", # vpn subnet (preferred)
    "100.10.1.1/32", # you home ISP public IP (fallback)
  ]

[lists.ipv4.wg_peers]
  comment = "WireGuard peer endpoints"
  entries = [
    "100.10.1.1/32", # this could be your home public IP, for example
  ]

[lists.ipv4.snmp]
  comment = "SNMP monitoring (over VPN)"
  entries = [
    "172.16.1.5/32",
  ]

[lists.ipv6.ssh]
  comment = "IPv6 SSH allowlist"
  entries = [
    "2001:db8::/64",
  ]

[lists.ipv6.wg_peers]
  comment = "IPv6 WireGuard peers"
  entries = [
    "2001:db8::2/128",
  ]

# ---------------------------------------------------------------------------
# IPv4 INPUT
# ---------------------------------------------------------------------------

[[chains.ipv4.input]]
  comment  = "SSH"
  protocol = "tcp"
  dport    = [22]
  src_list = "ssh"
  action   = "accept"

[[chains.ipv4.input]]
  comment  = "SNMP"
  protocol = "udp"
  dport    = [161]
  src_list = "snmp"
  action   = "accept"

# open web/HTTP to ALL sources and IPs (public internet)
# but rate-limit all NEW connections, as to limit DOS, SYN floods, bots, etc.
# without impeding existing, established web connections
#
# useful for things like a reverse proxy or web server
# if reverse proxying, please tighten your ACLs there as needed
[[chains.ipv4.input]]
  comment    = "HTTP/HTTPS - rate limite new"
  iifname    = "eth0" # your public-facing interface
  protocol   = "tcp"
  dport      = [80, 443]
  ct_state   = ["new"]
  rate_limit = { rate = "20/second", burst = "50 packets" }
  action     = "accept"
  over_limit = "drop"

# wireguard will be open to ALL sources and IPs (public interet)
# only valid WG peers will be able to do anything on this socket
# feel free to limit NEW connection_states here as well
[[chains.ipv4.input]]
  comment  = "WireGuard tunnel"
  protocol = "udp"
  dport    = [51820]
  src_list = "wg_peers"
  action   = "accept"

# ---------------------------------------------------------------------------
# IPv6 INPUT
# ---------------------------------------------------------------------------

[[chains.ipv6.input]]
  comment  = "SSH IPv6"
  protocol = "tcp"
  dport    = [22]
  src_list = "ssh"
  action   = "accept"

[[chains.ipv6.input]]
  comment  = "WireGuard IPv6"
  protocol = "udp"
  dport    = [51820]
  src_list = "wg_peers"
  action   = "accept"

# ---------------------------------------------------------------------------
# VPN exit-node mode (commented out by default)
# Uncomment if this VPS routes WireGuard client traffic OUT to the internet.
# ---------------------------------------------------------------------------

